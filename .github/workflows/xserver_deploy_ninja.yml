name: Deploy to Ninja Homepage

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 15 * * *' # 日本時間 0:00 (毎日実行)
  workflow_dispatch: # 手動実行を有効化

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Check out the repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install fonts for Typst (Japanese)
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-noto-cjk fonts-ipafont-gothic fonts-ipafont-mincho
        # TypstがデフォルトでNoto Serif JPを使用する場合が多いので、優先的にインストール
        # 必要に応じて他のフォントも追加
        # 例: sudo apt-get install -y fonts-ipamj-mincho fonts-mplus
        sudo fc-cache -fv # フォントキャッシュを更新 

    - name: Set up Typst
      uses: typst-community/setup-typst@v4
      with:
        typst-version: 0.14.2

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Build with Astro
      run: npm run build
      env:
        GOOGLE_CALENDAR_API_KEY: ${{ secrets.GOOGLE_CALENDAR_API_KEY }}
        PUBLIC_GOOGLE_CALENDAR_ID: ${{ secrets.PUBLIC_GOOGLE_CALENDAR_ID }}
        PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.PUBLIC_CLOUDINARY_CLOUD_NAME }}


    - name: Deploy to Ninja Homepage
      run: |
        sudo apt-get update
        sudo apt-get install -y lftp
        lftp -c "set ftp:ssl-allow no; open -u ${{ secrets.FTP_USERNAME_NINJA }},${{ secrets.FTP_PASSWORD_NINJA }} ${{ secrets.FTP_SERVER_NINJA }}; mirror -R --parallel=10 ./dist/ /" 

    - name: IndexNow (Manual Ping)
      run: |
        curl -i -X GET "https://www.bing.com/indexnow?url=https://mathdoc.ifdef.jp/sitemap-0.xml&key=${{ secrets.INDEXNOW_KEY }}"
